<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IFT</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>IFT</h2>

<div id="login">
<input id="username" placeholder="username">
<button onclick="login()">Login</button>
</div>

<div id="home" style="display:none">

<h3 id="user"></h3>

<input id="target" placeholder="name@ift.com">

<br>

<button onclick="voiceCall()">📞 Voice</button>
<button onclick="videoCall()">📹 Video</button>
<button onclick="favorite()">⭐ Scrap</button>

</div>

<div id="incoming" style="display:none">
<h3 id="caller"></h3>
<button onclick="accept()">Accept</button>
</div>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<audio id="ring" src="https://actions.google.com/sounds/v1/alarms/phone_alerts_and_rings.ogg" loop></audio>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
